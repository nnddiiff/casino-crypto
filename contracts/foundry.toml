[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Зависимости-ремаппинги вынесены в remappings.txt (читается автоматически,
# подхватывается и solidity-расширениями IDE).

# Закреплённый компилятор для воспроизводимости сборки.
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
# Base — OP Stack L2; cancun активирован, prague на L2 ещё не везде.
evm_version = "cancun"

[profile.default.fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"

# RPC берётся из окружения (.env), чтобы не хардкодить endpoint.
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

# Верификация на Basescan Sepolia. chain id Base Sepolia = 84532.
# Ключ берётся на basescan.org (НЕ etherscan.io).
[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }
